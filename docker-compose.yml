services:
  web:
    build: .
    image: tradeflow-ai
    # Maps host :80 -> container :8000. No domain yet, so we serve plain HTTP
    # directly on port 80. Add Nginx + certbot here later for HTTPS.
    ports:
      - "80:8000"
    env_file:
      - .env
    environment:
      # Reach the query service by its compose service name (not 127.0.0.1,
      # which inside this container would mean the web container itself).
      - QUERY_API_URL=http://query:8000
    depends_on:
      - query
    volumes:
      - tradeflow_data:/app/web/_store
    restart: unless-stopped

  query:
    build: ./query-system
    image: tradeflow-query
    # scraper = real Amazon data via Playwright/Chromium (built into the image).
    # NOTE: from a datacenter IP, Amazon often triggers a robot/captcha block —
    # the tool then returns an error. mock = offline sample data; api = Rainforest.
    environment:
      - DATA_SOURCE_MODE=scraper
    expose:
      - "8000"
    restart: unless-stopped

volumes:
  tradeflow_data:
