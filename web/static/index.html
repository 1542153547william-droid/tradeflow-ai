<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TradeFlow-AI</title>
<style>
  :root { color-scheme: light dark; --bg:#0f1115; --panel:#171a21; --line:#262b36;
    --txt:#e7e9ee; --dim:#9aa3b2; --accent:#4f9cf9; --user:#1f6feb22; --bot:#20242e; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif;
    background:var(--bg); color:var(--txt); display:flex; flex-direction:column; height:100vh; }
  header { padding:14px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  #badge { font-size:12px; color:var(--dim); border:1px solid var(--line); border-radius:20px; padding:2px 10px; }
  #agent { background:var(--panel); color:var(--txt); border:1px solid var(--line); border-radius:8px;
    padding:4px 8px; font:inherit; font-size:13px; }
  #log { flex:1; overflow-y:auto; padding:18px; max-width:820px; width:100%; margin:0 auto; }
  .msg { margin:0 0 14px; padding:11px 14px; border-radius:12px; white-space:pre-wrap; word-break:break-word; }
  .user { background:var(--user); border:1px solid #1f6feb44; margin-left:15%; }
  .bot { background:var(--bot); border:1px solid var(--line); margin-right:15%; }
  .role { font-size:11px; color:var(--dim); margin-bottom:4px; letter-spacing:.04em; text-transform:uppercase; }
  details { margin-top:8px; font-size:13px; color:var(--dim); }
  details summary { cursor:pointer; }
  details pre { background:#0c0e13; border:1px solid var(--line); border-radius:8px; padding:8px 10px; overflow-x:auto; margin:6px 0 0; }
  footer { border-top:1px solid var(--line); padding:12px; }
  form { display:flex; gap:8px; max-width:820px; margin:0 auto; }
  #inp { flex:1; background:var(--panel); border:1px solid var(--line); color:var(--txt);
    border-radius:10px; padding:11px 13px; font:inherit; resize:none; }
  button { background:var(--accent); color:#fff; border:0; border-radius:10px; padding:0 18px; font:inherit; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
</style>
</head>
<body>
<header>
  <h1>TradeFlow-AI</h1>
  <select id="agent" title="选择要测试的智能体"></select>
  <span id="badge">连接中…</span>
</header>
<div id="log">
  <div class="msg bot"><div class="role">assistant</div>你好，我是 TradeFlow-AI 外贸助手。有什么可以帮你的？</div>
</div>
<footer>
  <form id="form">
    <textarea id="inp" rows="1" placeholder="输入消息，Enter 发送 / Shift+Enter 换行" autofocus></textarea>
    <button id="send" type="submit">发送</button>
  </form>
</footer>
<script>
const log = document.getElementById('log');
const form = document.getElementById('form');
const inp = document.getElementById('inp');
const send = document.getElementById('send');
const badge = document.getElementById('badge');
const agentSel = document.getElementById('agent');

fetch('/api/info').then(r => r.json()).then(d => {
  badge.textContent = d.provider === 'mock' ? 'mock 模式（未接真实模型）' : `${d.provider} · ${d.model}`;
}).catch(() => badge.textContent = '离线');

fetch('/api/agents').then(r => r.json()).then(list => {
  agentSel.innerHTML = list.map(a =>
    `<option value="${a.key}" title="${a.desc}">${a.label}</option>`).join('');
}).catch(() => {});

function add(role, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
  el.innerHTML = `<div class="role">${role}</div>`;
  el.appendChild(document.createTextNode(text));
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
  return el;
}

function addSteps(el, steps) {
  if (!steps || !steps.length) return;
  const lines = steps.map(s => {
    let t = `#${s.iteration}`;
    if (s.reasoning) t += `\n  推理: ${s.reasoning}`;
    if (s.tools && s.tools.length) t += `\n  工具: ${s.tools.join(', ')}`;
    if (s.text) t += `\n  文本: ${s.text}`;
    return t;
  }).join('\n');
  const d = document.createElement('details');
  d.innerHTML = `<summary>推理过程（${steps.length} 步）</summary><pre></pre>`;
  d.querySelector('pre').textContent = lines;
  el.appendChild(d);
}

async function ask(message) {
  add('user', message);
  send.disabled = true;
  const el = add('assistant', '…');
  try {
    const r = await fetch('/api/chat', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message, agent: agentSel.value || 'default' }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    el.childNodes[1].nodeValue = d.reply || '(空)';
    addSteps(el, d.steps);
  } catch (e) {
    el.childNodes[1].nodeValue = '出错了：' + e.message;
  } finally {
    send.disabled = false;
    log.scrollTop = log.scrollHeight;
  }
}

form.addEventListener('submit', e => {
  e.preventDefault();
  const m = inp.value.trim();
  if (!m) return;
  inp.value = '';
  ask(m);
});
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});
</script>
</body>
</html>
